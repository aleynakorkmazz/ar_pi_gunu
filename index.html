<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Günü AR Deneyimi</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
        }
        
        #version-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #ffffff;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 6px 12px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            z-index: 9999;
            pointer-events: none;
        }
    </style>

    <script>
        AFRAME.registerComponent('video-controller', {
            init: function () {
                const target = this.el;
                const video = document.querySelector('#ar-video');

                target.addEventListener('targetFound', event => {
                    console.log("Hedef görsel bulundu, video başlıyor...");
                    video.play();
                });

                target.addEventListener('targetLost', event => {
                    console.log("Hedef kaybedildi, video duraklatıldı.");
                    video.pause();
                });
            }
        });
    </script>
</head>
<body>

    <div id="version-badge">v1.0.0</div>

    <a-scene mindar-image="imageTargetSrc: pigunu/targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

        <a-assets>
            <video id="ar-video" src="pigunu/yeni.mp4" preload="auto" loop crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" video-controller>
            <a-video src="#ar-video" position="0 0 0" height="0.55" width="1" rotation="0 0 0"></a-video>
        </a-entity>

    </a-scene>

</body>
</html>
